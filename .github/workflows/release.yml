name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: scheduler-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: scheduler-x86_64-apple-darwin.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: scheduler-aarch64-apple-darwin.tar.gz
    runs-on: ${{ matrix.os }}
    env:
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
      MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
      MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release -p scheduler-cli --target ${{ matrix.target }}
      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.MACOS_CERTIFICATE_P12_BASE64 != ''
        run: |
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain
      - name: Sign macOS binary
        if: runner.os == 'macOS' && env.MACOS_CODESIGN_IDENTITY != ''
        run: |
          codesign --force --options runtime --timestamp --sign "$MACOS_CODESIGN_IDENTITY" ./target/${{ matrix.target }}/release/scheduler
          codesign --verify --strict --verbose=2 ./target/${{ matrix.target }}/release/scheduler
      - name: Notarize macOS binary archive
        if: runner.os == 'macOS' && env.MACOS_NOTARY_APPLE_ID != ''
        run: |
          ditto -c -k --keepParent ./target/${{ matrix.target }}/release/scheduler scheduler-notary.zip
          xcrun notarytool submit scheduler-notary.zip \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --wait
      - name: Verify binary
        run: ./target/${{ matrix.target }}/release/scheduler --version
      - name: Package archive
        run: |
          mkdir -p dist
          cp ./target/${{ matrix.target }}/release/scheduler dist/scheduler
          tar -C dist -czf "${{ matrix.archive }}" scheduler
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f -name 'scheduler-*.tar.gz' -exec cp {} dist/ \;
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/scheduler-*.tar.gz
          generate_release_notes: true
